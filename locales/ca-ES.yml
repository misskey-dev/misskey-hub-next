_landing:
  _hero:
    description: "Misskey és una plataforma de xarxes socials descentralitzades i de codi obert."
    gettingStarted: "Comença a..."
  _keyFeatures:
    _open:
      title: "Lliure"
      description: "Misskey és una aplicació de codi obert i qualsevol pot fer-lo servir lliurement."
    _federated:
      title: "Federat"
      description: "Misskey incorpora un protocol descentralitzat, que connecta servidors de diferents comunitats."
    _powerful:
      title: "Potent"
      description: "Misskey té una varietat de funcions a escala de producció i pot ser personalitzat a molts nivells. És la millor solució per a grups grans i petits."
  _introduction:
    title: "Crear amb Misskey"
    description: "Misskey et permet construir d'una manera senzilla la teva plataforma única sense cap implementació complexa. Com el servei que has creat és completament teu, no existeix el risc de dependre d'altres plataformes existents per la teva presència en línia."
    tip: "Misskey, per si mateix no és un servei web. És l'aplicatiu fundacional per crear un servei web, semblant a fer servir Wordpress per fer una web."
  _decenterized:
    title: "Misskey és {0}"
    description: "Misskey és un projecte lliure i obert, el que vol dir que qualsevol pot crear un servidor fent servir Misskey, i és per això que ja hi han molts servidors disponibles a internet. Altre característica important és que Misskey fa servir un protocol de comunicació anomenat {0}, això significa que es igual quin servidor escollís, pots interactuar amb usuaris d'altres servidors. Per això es diu descentralitzat i això el fa totalment diferent a altres serveis com Twitter, que es publica sota una mateixa adreça URL i per un únic operador. Els temes principals, els usuaris i els idiomes canvien d'un servidor a un altre i part de la diversió es trobar el servidor més adecuat a la teva manera de ser (per descomptat, crear el teu propi servidor també es divertit)."
    activityPub: "ActivityPub"
  _useCases:
    title: "Com el pots fer servir"
    single: "Servidor personal per mantenir-te informat i per informar de les teves coses"
    official: "Servidor dedicat pel compte promocional d'una companyia"
    community: "Un servidor comunitari per a persones que comparteixin els mateixos interessos"
    inHouse: "Com a servidor privat social d'una companyia"
  _free:
    title: "Misskey és, i sempre serà, lliure i de codi obert"
    description: "Densa la seva creació al 2014 i en el futur, Misskey és i continuarà sent un programari de codi obert (OSS per les seves sigles en angles). El seu codi està disponible públicament per a qualsevol persona que el vulgui fer servir, modificar i distribuir de forma gratuïta. Misskey continua sent de codi obert gràcies al suport de la comunitat."
  _features:
    _root:
      title: "Funcions principals"
      description: "Misskey té una gamma molt ampla de característiques, tant generals com especials. Algunes són."
    _note:
      title: "Notes"
      description: "A Misskey les contribucions dels usuaris es diuen \"notes\". Pots citar altres notes i adjuntar imatges, vídeos, àudios o qualsevol altre arxiu."
    _federation:
      title: "Federació"
      description: "Fa servir ActivityPub, un protocol distribuït de codi obert, que li permet interactuar amb altres programes que suportin ActivityPub i també altres servidors Misskey."
    _reaction:
      title: "Reaccions"
      description: "Pots afegir \"reaccions\" a les teves notes, això et permetrà expressar i comunicar les teves emocions de forma fàcil i senzilla."
    _customEmojis:
      title: "Emojis personalitzats"
      description: "És possible crear emojis personalitzats per al servidor i fer-los servir en diferents parts de Misskey."
    _channel:
      title: "Canal"
      description: "Creant un canal et permet crear una comunitat dintre del servidor amb un tema en comú."
    _antenna:
      title: "Antena"
      description: "Pots crear línies de temps que continguin només notes que continguin determinades paraules."
    _drive:
      title: "Disc"
      description: "Hi ha una interfície per poder gestionar els arxius que has pujat. Això permet organitzar les teves imatges favorites en carpetes i tornar-les a compartir."
    _2fa:
      title: "Autentificació de doble factor"
      description: "Admet un seguit de tecnologies per augmentar la seguretat dels comptes, amb autentificació de doble factor mitjançant contrasenyes d'un sol ús i mitjançant claus físiques."
    _charts:
      title: "Gràfics"
      description: "Misskey ve equipat amb un motor que et permet visualitzar l'ús del servidor i altres informacions."
    _branding:
      title: "Marca"
      description: "Personalitza el logotip, les icones i els temes del teu servidor per crear, fàcilment, la teva imatge de marca."
    _roles:
      title: "Rol"
      description: "Els rols permeten personalitzar els permisos de cada usuari. Els rols condicionals també es poden utilitzar per assignar automàticament rols als usuaris que coincideixen amb certs criteris. També es poden fer servir insígnies als rols per ajudar a monetitzar el teu servidor."
    _moderation:
      title: "Moderació"
      description: "Per defecte s'inclouen una sèrie de funcions de moderació per facilitar-ne la gestió del servidor."
    _privacy:
      title: "Privacitat"
      description: "Control flexible sobre l'abast de la publicació de continguts amb àmplies opcions de privacitat."
    _multiPurpose:
      title: "Un o tots"
      description: "Pot fer-se servir com a xarxa social per un gran nombre d'usuaris, o com servidor personal, fent-lo servir com el teu propi i potent punt de connexió amb el Fedivers."
    _monetization:
      title: "Monetització"
      description: "Per garantir la sostenibilitat de les operacions, també hi ha ajudes que permeten monetitzar el servidor, com la visualització d'anuncis."
    _oss:
      title: "Mi ♥️ OSS"
      description: "Misskey ha sigut i continuarà sent de codi obert, amb el codi font accessible per tothom gratuïtament. El projecte Misskey també suporta altres aplicacions OSS."
    _battleTested:
      title: "fiabilitat"
      description: "Misskey ha estat provat en entorns reals durant més d'una dècada i està orgullós de ser altament fiable."
  _featuresServer:
    _root:
      title: "Funcions del servidor"
      description: "Característiques d'implementacions darrere de Misskey."
    _easyInstall:
      title: "Instal·lació senzilla"
      description: "Pot instal·lar-se amb comandes senzilles i també pot gestionar-se amb serveis d'allotjament proporcionats per diferents empreses."
    _easySetup:
      title: "Senzill de configurar"
      description: "La instal·lació d'un servidor Misskey no requereix cap configuració complexa i pot estar operatiu immediatament. Per altra banda es poden realitzar configuracions més avançades que s'adaptin a les seves necessitats."
    _api:
      title: "API"
      description: "Totes les funcions de Misskey és poden fer servir mitjançant una API HTTP, això facilita la integració amb altres aplicacions. També és compatible amb connexions Webhook i WebSockets que permet rebre esdeveniments de Misskey en temps real."
    _relay:
      title: "Suport de repetidors"
      description: "Admet servidors repetidors, que transmeten la informació del Fediverse, fent que es pugui recopilar informació sense la necessitat de connectar-se manualment a un gran nombre de servidors."
    _nodejs:
      title: "Node.js al darrere"
      description: "Misskey fa servir Node.js pel darrere, el que fa que sigui ràpid i lleuger."
    _postgresql:
      title: "PostgreSQL"
      description: "La base de dades principal és PostgreSQL, que proporciona una gestió sòlida de les dades."
    _fullTextSearch:
      title: "Cercador de text complert"
      description: "Fes cerques de text complet fent servir les capacitats de PostgreSQL o motors de cerca externs com Meilisearch."
    _jobQueue:
      title: "Eficaç cua de feines"
      description: "Per gestionar la cua de feines es fa servir BullMQ, que permet que les tasques es processin ràpida i amb eficiència. A més l'inspector de Misskey, implementar de forma nativa al taulell de control, permet fer la gestió sense la necessitat de fer servir eines externes."
    _cdn:
      title: "Suport de CDN"
      description: "Suport per desar recursos a CDNs externs, reduint la càrrega del servidor i retallant costos."
    _ftt:
      title: "FTT"
      description: "La tecnologia Fan-out Timeline (FTT) construeix les línies de temps a Redis per millorar el rendiment."
    _rbt:
      title: "RBT"
      description: "La tecnologia Reactions Buffering Technology (RBT) deixa a Redis les dades de les reaccions per millorar el rendiment."
    _scalable:
      title: "Escalable"
      description: "Dissenyat per escalar amb l'augment d'usuaris mitjançant agrupació de processos, l'equilibrament de càrregues entre servidors i replicació de bases de dades."
    _seo:
      title: "SEO"
      description: "Alguns continguts poden ser indexats per motors de cerca gràcies a la tecnologia SSR (Server Side Rendering) i la compatibilitat amb OGP permet la previsualització del contingut a xarxes socials. Per descomptat també pots configurar el sistema per rebutjar que els indexadors puguin indexar el contingut que no vols."
    _ml:
      title: "Aprenentatge automàtic"
      description: "Les funcions d'aprenentatge automàtic incloses es poden fer servir per reduir les càrregues operatives. Per exemple es poden fer servir per filtrar automàticament els fitxers sensibles."
    _sentry:
      title: "Suport per a Sentry"
      description: "Com és compatible amb la recollida de dades de Sentry, es pot fer servir per supervisar els recursos, fer comprovacions de l'estat i fer tasques de manteniment al servidor."
  _featuresClient:
    _root:
      title: "Interfície web"
      description: "Característiques de la interfície web d'alta funcionalitat (Misskey Web) inclosa a Misskey."
    _responsive:
      title: "Interfície d'usuari adaptativa"
      description: "La interfície de l'usuari ha sigut dissenyada fent servir un disseny propi i ha sigut implementada amb molta cura per garantir una visualització i funcionalitat òptimes tant a ordinadors de sobretaula, tauletes i mòbils."
    _theme:
      title: "Temes"
      description: "Pots fer servir Misskey amb la teva aparença preferida. Per descomptat la compatibilitat amb el mode fosc és inclosa. També pots crear els teus temes avançats."
    _mfm:
      title: "MFM"
      description: "Les notes són compatibles amb MFM, un llenguatge de marcat exclusiu de Misskey. El format del text, l'ús de negreta, inserir enllaços i afegir animacions, es pot fer amb una sintaxi molt senzilla."
    _widgets:
      title: "Ginys"
      description: "Organitza lliurement diferents tipus de ginys per accedir més ràpidament a la informació que necessites."
    _deck:
      title: "UI de l'escriptori"
      description: "L'ús de la interfície d'usuari d'escriptori permet la personalització més a fons de la teva interfície. Ots crear el teu propi client."
    _embed:
      title: "Incrustació a altres llocs web"
      description: "Les notes, línies de temps i altres continguts poden integrar-se i mostrar-se en llocs web externs."
    _realtimeMode:
      title: "Mode en temps real"
      description: "サーバーとWebsocket接続することで、タイムラインなどのコンテンツをリアルタイムで受信することができます。"
    _pushNotification:
      title: "Enviament de notificacions"
      description: "Com admet notificacions emergents, pots rebre notificacions del servidor en temps real."
    _multiAccounts:
      title: "Comptabilitat amb diversos comptes"
      description: "Pots canviar, fàcilment, entre diferents comptes."
    _watermark:
      title: "Funció de marca d'aigua"
      description: "Afegeix automàticament marques d'aigua a les imatges que publiquis, això fa més senzill conservar la informació d'autoria. Les marques d'aigua es poden personalitzar lliurement."
    _imageEditing:
      title: "Funció d'edició d'imatges"
      description: "Pots afegir efectes a les imatges, fer correccions de color i crear una gran varietat d'expressions creatives."
    _achievements:
      title: "Assoliments"
      description: "Proporciona motivacions per experimentar amb les característiques de Misskey i ajudar a la incorporació de nous usuaris."
    _plugin:
      title: "Extensions"
      description: "Es poden instal·lar extensions que facin servir AiScript per ampliar les funcionalitats del client."
    _settingsManagement:
      title: "Gestió de la configuració flexible"
      description: "Pots anul·lar qualsevol configuració del client per compte, compartir i sincronitzar la configuració entre diferents dispositius. A més la informació de la configuració es pot copiar automàticament."
    _pwa:
      title: "PWA"
      description: "Misskey Web és compatible amb les aplicacions web progressives (PWA) i es pot executar en dispositius com si fos una aplicació nativa."
    _i18n:
      title: "Suport multilingüe"
      description: "El client es troba disponible en diferents idiomes."
  _featuresUpcoming:
    _root:
      title: "Pròximament"
      description: "Presentació de les funcions que han d'arribar."
    _jwt:
      title: "Autentificació JWT"
      description: "Implementar l'autenticació sense estat fent servir web tokens JSON (JWT) per aconseguir una validació de sol·licituds més segura i ràpida."
    _newBackend:
      title: "Backend més lleuger"
      description: "Estem desenvolupant una implementació del backend completament nova per permetre un funcionament més ràpid i lleuger."
    _vueVapor:
      title: "Compatibilitat amb el mode Vapor"
      description: "Admet la nova estratègia de compilació de Vue adaptada al frontend, i això permet una interfície d'usuari més lleugera."
  _getStarted:
    title: "Primers passos amb Misskey"
