    description: "Misskey是一个去中心化开源社交平台。"
    gettingStarted: "开始"
  _keyFeatures:
    _open:
      title: "开放"
      description: "Misskey是一款开源的软件，任何人都可以自由地使用Misskey。"
    _federated:
      title: "去中心化"
      description: "Misskey 采用去中心化协议，将不同服务器上的社区连接起来。"
    _powerful:
      title: "功能强大"
      description: "Misskey具备着多种多样的产品级功能，可依照需求进行精细化定制。无论人数多少，都是最合适您的解决方案。"
  _introduction:
    title: "用 Misskey 创作吧"
    description: "使用 Misskey，您无需进行繁琐的开发，即可轻松构建自己的专属平台。通过 Misskey 创建的服务完全归您所有，因此也无需承担在信息发布方面对现有平台的依赖风险。"
    tip: "Misskey 并非“一项网络服务本身”，而是用于构建微型博客服务的“基础软件”。这就好比您使用 WordPress 这类软件来创建网站一样。"
  _decenterized:
    title: "Misskey 是{0}"
    description: "Misskey 是一个自由开放的项目，任何人都可以自由地使用 Misskey 创建服务器，因此互联网上已经诞生了各种各样的服务器。 此外，Misskey 实现了一个名叫{0}的分布式通信协议。因此，无论您选择哪台服务器，都可以与其他服务器上的用户交互。 这就是它被称为去中心化的原因，也是它与 Twitter 等其他服务的根本不同之处。 不同服务器的主要话题、用户群和语言各不相同，找到适合自己的服务器也是乐趣之一（当然，创建自己的服务器也很有趣哦）。"
    activityPub: "ActivityPub"
  _useCases:
    title: "可以这样使用"
    single: "用于信息收集与发布的个人专属服务器"
    official: "用于开设公司宣传账号的专属服务器"
    community: "面向有相同兴趣用户的社区服务器"
    inHouse: "用作内部社交网络的私有服务器"
  _free:
    title: "Misskey 永久免费且开放"
    description: "自2014年开发之初，直至未来，Misskey始终是一款公开程序源代码的开源软件（OSS）。此外，任何人都可以免费、自由地使用其源代码。Misskey能够持续作为开源软件，离不开大家的支持。"
  _features:
    _root:
      title: "主要功能"
      description: "Misskey 有丰富的功能，从各家都有的功能到 Misskey 独有的功能。这里来介绍一些。"
    _note:
      title: "帖子"
      description: "在 Misskey 中，您可以引用其他帖子并附加图片、视频、音频或任何其他文件。"
    _federation:
      title: "联邦"
      description: "Misskey 实现了 ActivityPub 这一分布式协议，因此可以与其他支持 ActivityPub 的软件以及其他 Misskey 服务器交互。"
    _reaction:
      title: "回应"
      description: "您可以在帖子中添加 \"回应\"，轻松传达和交流您的感受。"
    _customEmojis:
      title: "自定义表情"
      description: "可制作服务器专属的的自定义表情，并在Misskey内的各处使用。"
    _channel:
      title: "频道"
      description: "创建频道后，即可围绕共同主题在实例内建立专属社区。"
    _antenna:
      title: "天线功能"
      description: "创建仅收集包含特定词汇的帖子的时间线。"
    _drive:
      title: "网盘"
      description: "Misskey 的网盘功能可以让你轻松地将收藏收藏的图片上传到网盘、整理到文件夹中，以供分享。"
    _2fa:
      title: "多要素验证"
      description: "支持通过一次性密码多因素认证及物理密钥通行密钥认证等多种技术增强账户安全性。"
    _charts:
      title: "图表"
      description: "Misskey 内置图表引擎，可轻松实现服务器的使用情况和其他信息的可视化。"
    _branding:
      title: "品牌化"
      description: "通过定制实例标识、图标及主题，轻松实现社交平台品牌打造。"
    _roles:
      title: "角色"
      description: "通过角色功能可精细化配置用户权限；使用条件角色还能自动为匹配用户分配角色，并设置角色徽章助力实例变现。"
    _moderation:
      title: "内容审查"
      description: "原生内置完备的内容审查功能，助力实例高效运维。"
    _privacy:
      title: "隐私"
      description: "凭借丰富的隐私设置，灵活控制内容的公开范围。"
    _multiPurpose:
      title: "独自一人，或与众人同在"
      description: "既支持作为多用户社交平台的运营，也可用作个人实例。它将成为您在联邦宇宙中专属的枢纽节点。"
    _monetization:
      title: "收益化"
      description: "提供广告展示等实例变现辅助功能，助您实现可持续运营。"
    _oss:
      title: "我们❤开源"
      description: "Misskey始终并将持续开源，允许任何人免费自由使用源代码；同时Misskey项目积极为其他开源软件提供支援。"
    _battleTested:
      title: "可靠性"
      description: "Misskey历经逾十年实战环境检验，自信具备卓越可靠性。"
  _featuresServer:
    _root:
      title: "服务器功能"
      description: "支撑 Misskey 的后端实现特点。"
    _easyInstall:
      title: "轻松安装"
      description: "支持简单命令行安装，亦可选用托管服务，省去管理维护成本。"
    _easySetup:
      title: "设置也同样简单"
      description: "Misskey实例部署无需复杂配置，即可即刻投入运营；亦支持按需进行高级定制。"
    _api:
      title: "API"
      description: "Misskey所有功能均可通过HTTP API操作，便于第三方应用集成；更支持Webhook与WebSocket连接，实时获取事件推送。"
    _relay:
      title: "中继支持"
      description: "支持连接联邦宇宙中继服务器，自动同步全网活动数据，无需手动关联多个实例。"
    _nodejs:
      title: "Node.js 后端"
      description: "Misskey 后端采用 Node.js，运行高速且轻量。"
    _postgresql:
      title: "PostgreSQL"
      description: "主数据库采用 PostgreSQL，实现了稳健可靠的数据管理。"
    _fullTextSearch:
      title: "全文搜索"
      description: "除了 PostgreSQL，还可以使用 Meilisearch 等全文搜索引擎进行全文搜索。"
    _jobQueue:
      title: "高效任务队列"
      description: "采用 BullMQ 任务队列支持跨实例高效处理任务；深度集成的原生队列检视器可直接在控制台管理，无需第三方工具。"
    _cdn:
      title: "支持 CDN"
      description: "支持通过外部 CDN 缓存资源。通过减少服务器的请求，可以降低负载并削减成本。"
    _ftt:
      title: "FTT"
      description: "通过 Fan-out Timeline Technology (FTT)，可在 Redis 上构建时间线，从而提升性能。"
    _rbt:
      title: "RBT"
      description: "通过 Reactions Buffering Technology (RBT)，可将反应（Reaction）信息缓存在 Redis 上，从而提升性能。"
    _scalable:
      title: "可扩展"
      description: "支持进程集群、多服务器负载均衡以及数据库复制，能够应对用户增长。"
    _seo:
      title: "SEO"
      description: "可对部分内容进行服务端渲染（SSR），以便被搜索引擎收录。同时，也支持开放图谱协议（OGP），因此能在社交媒体上分享时显示预览。当然，在不想被收录的情况下，也可以设置拒绝爬虫访问。"
    _ml:
      title: "机器学习"
      description: "还可以利用内置的机器学习功能，自动过滤敏感媒体等内容，从而减轻运营负担。"
    _sentry:
      title: "支持 Sentry"
      description: "支持通过 Sentry 收集服务器指标，可用于服务器资源监控、健康检查和维护。"
  _featuresClient:
    _root:
      title: "WebUI"
      description: "为您介绍 Misskey 附带的高性能 Web 前端（Misskey Web）的特点。"
    _responsive:
