_landing:
  _hero:
    description: "Misskey ist eine quelloffene, dezentralisierte Plattform für soziale Netzwerke."
    gettingStarted: "Erste Schritte"
  _keyFeatures:
    _open:
      title: "offen"
      description: "Misskey ist eine Open-Source-Software und kann von allen frei verwendet werden."
    _federated:
      title: "Dezentralisierung"
      description: "Misskey implementiert ein dezentrales Protokoll, das Communities auf verschiedenen Servern miteinander verbindet."
    _powerful:
      title: "パワフル"
      description: "Misskeyはカスタマイズ可能なプロダクションレベルの様々な機能を備えています。多人数でも少人数でも、最適なソリューションに。"
  _introduction:
    title: "Misskeyで作ろう"
    description: "Misskeyを使えば、面倒な実装を行うことなく、簡単に独自のプラットフォームを構築可能です。あなたがMisskeyを使って作ったサービスはあなただけのものなので、情報発信における既存プラットフォームへの依存リスクもありません。"
    tip: "Misskeyは「Webサービスそのもの」ではなく、マイクロブログサービスを作るための「基盤となるソフトウェア」です。Webサイトを作るのにWordPressといったソフトウェアを使うのと同じです。"
  _decenterized:
    title: "Misskey ist eine {0}"
    description: "Misskey ist ein freies und offenes Projekt, was bedeutet, dass es jedem freisteht, einen Server mit Misskey zu erstellen, so das bereits eine Menge von Servern im Internet verfügbar sind. Ein weiteres Merkmal ist, dass Misskey ein verteiltes Kommunikationsprotokoll namens {0} implementiert. Das bedeutet, egal welcher Server gewählt wird, alle mit allen Benutzern auf anderen Servern interagieren können. Deshalb wird es dezentralisiert genannt und unterscheidet sich grundlegend von anderen Diensten wie zum Beispiel Twitter, die unter einer einzigen Website von einem einzigen Ceo veröffentlicht werden. Die Themen, Gruppen und Sprachen unterscheiden sich von Server zu Server. Den Server zu finden, der zu dir passt, ist Teil des Spaßes (und natürlich macht es auch Spaß, einen eigenen Server zu haben)."
    activityPub: "ActivityPub"
  _useCases:
    title: "こんな使い方ができます"
    single: "情報収集・情報発信のための自分専用のサーバー"
    official: "会社の広報アカウントを設置する専用のサーバー"
    community: "同じ関心をもつユーザー向けのコミュニティサーバー"
    inHouse: "社内SNSとしてのプライベートサーバー"
  _free:
    title: "Misskeyはずっと無料でオープン"
    description: "Misskeyは2014年の開発当初から、そしてこれから未来も、プログラムのソースコードが公開されているオープンソースソフトウェア(OSS)です。また、誰でも無料で・自由にソースコードを利用可能です。MisskeyがOSSであり続けられるのは皆様からの支援のおかげです。"
  _features:
    _root:
      title: "Basis-Features"
      description: "Misskey verfügt über eine breite Palette von allgemeinen und speziellen Funktionen. Einige davon sind"
    _note:
      title: "Notiz"
      description: "In Misskey werden Beiträge als „Notizen“ bezeichnet. Benutzer können Notizen zitieren und Bilder, Videos, Audio- oder andere Dateien anhängen."
    _federation:
      title: "Fediversum"
      description: "ActivityPub ist ein offenes und dezentrales Protokoll, das mit anderer Software und Misskey-Instanzen interagieren kann, die ActivityPub unterstützt."
    _reaction:
      title: "Reaktionen"
      description: "Füge Notizen „Reaktionen“ hinzufügen um so Gefühle einfach auszudrücken und dich mitzuteilen."
    _customEmojis:
      title: "カスタム絵文字"
      description: "Misskeyの様々な場所で使用できる、サーバーオリジナルの絵文字を作成可能です。"
    _channel:
      title: "チャンネル"
      description: "チャンネルを作成すれば、共通のテーマでサーバー内コミュニティを作成することが可能です。"
    _antenna:
      title: "アンテナ"
      description: "特定のワードが含まれるノートだけを収集するタイムラインを作成可能です。"
    _drive:
      title: "Drive"
      description: "Schnittstelle zur Verwaltung hochgeladener Dateien. So können Lieblingsbilder ganz einfach in Ordnern organisieren und freigegeben werden."
    _2fa:
      title: "多要素認証"
      description: "ワンタイムパスワードを使用した多要素認証や、物理的なキーを使用したパスキー認証で、アカウントのセキュリティを高める各種技術をサポート。"
    _charts:
      title: "Statistiken"
      description: "Misskey verfügt über eine integrierte Diagramm-Engine, mit der sich Dinge wie die Serverauslastung einfach visualisieren lassen."
    _branding:
      title: "ブランディング"
      description: "サーバーのロゴ、アイコン、テーマなどをカスタマイズして、簡単にSNSのブランディングを行えます。"
    _roles:
      title: "ロール"
      description: "ロールを使用すると、ユーザーごとに権限を細かくカスタマイズできます。また、コンディショナルロールを使えば、条件に一致するユーザーに自動でロールをアサインすることも可能です。ロールにバッジを設定して、サーバーのマネタイズに役立てることもできます。"
    _moderation:
      title: "モデレーション"
      description: "サーバー運営を助ける、充実のモデレーション機能が標準搭載。WebUIに統合されているため、シームレスに操作可能です。"
    _privacy:
      title: "プライバシー"
      description: "豊富なプライバシー設定で、コンテンツの公開範囲を柔軟にコントロール。"
    _multiPurpose:
      title: "ひとりでも、みんなでも"
      description: "多数の利用者を受け入れるSNSとしての運用はもちろん、個人用サーバーとしての利用もサポート。Fediverseと繋がるための、あなただけの強力な拠点になります。"
    _monetization:
      title: "収益化"
      description: "広告の表示など、サーバーのマネタイズを助ける機能も用意されていて、持続可能な運用を目指せます。"
    _oss:
      title: "Mi ❤️ OSS"
      description: "Misskeyはこれまでもこれからもオープンソースで、誰でも自由に、無料でソースコードを利用可能です。またMisskey Projectは、他のOSSに対して積極的に支援活動を行っています。"
    _battleTested:
      title: "信頼性"
      description: "Misskeyは10年以上にわたって実際の環境で使われており(battle-tested)、高い信頼性があると自負しています。"
  _featuresServer:
    _root:
      title: "サーバーの機能"
      description: "Misskeyを支えるバックエンド実装の特徴。"
    _easyInstall:
      title: "簡単インストール"
      description: "簡単なコマンドでインストールできるほか、各社提供のホスティングサービスを利用すれば、管理の手間も省けます。"
    _easySetup:
      title: "セットアップもカンタン"
      description: "Misskeyサーバーのセットアップに複雑な設定は不要。ウィザードに従うだけで最適な設定が行われ、すぐに運用を始められます。一方、ニーズに合わせて高度な設定を行うことも可能です。"
    _api:
      title: "API"
      description: "Misskeyの全ての機能はHTTP APIを通じて操作でき、他のアプリケーションとの連携も容易です。さらに、WebhookやWebSocket接続もサポートしているので、リアルタイムにMisskeyからのイベントを受け取ることも可能です。"
    _relay:
      title: "リレー対応"
      description: "Fediverse内のアクティビティを中継するリレーサーバーへの接続をサポートしているので、手動で多数のサーバーと繋げることなく情報収集が可能です。"
    _nodejs:
      title: "Node.jsバックエンド"
      description: "MisskeyはバックエンドにNode.jsを採用しており、高速・軽量に動作します。"
    _postgresql:
      title: "PostgreSQL"
      description: "メインのデータベースにはPostgreSQLを採用し、堅牢なデータ管理を実現しています。"
    _fullTextSearch:
      title: "全文検索"
      description: "PostgreSQLのほか、Meilisearchなどの全文検索エンジンを使用した全文検索を行うことができます。"
    _jobQueue:
      title: "高効率ジョブキュー"
      description: "ジョブキューにBullMQを採用し、タスクを複数のサーバーで効率的に処理。また、Misskeyネイティブで実装されたインスペクタはコントロールパネルに統合され、外部ツールに頼ることなく管理が可能です。"
    _cdn:
      title: "CDN対応"
      description: "外部CDNによるリソースのキャッシュに対応しています。サーバーへのリクエストを減らすことで、負荷低減・コスト削減が可能です。"
    _ftt:
      title: "FTT"
      description: "Fan-out Timeline Technology(FTT)により、タイムラインをRedis上に構築しパフォーマンスを向上させることができます。"
    _rbt:
      title: "RBT"
      description: "Reactions Buffering Technology(RBT)により、リアクション情報をRedis上にキャッシュしパフォーマンスを向上させることができます。"
    _scalable:
      title: "スケーラブル"
      description: "プロセスのクラスタリング、複数サーバーによるロードバランス、データベースのレプリケーションに対応しており、ユーザーの増加にも対応できます。"
    _seo:
      title: "SEO"
      description: "一部のコンテンツのSSRを行い、検索エンジンへインデックスさせることができるほか、OGPに対応しているのでソーシャルメディア上で共有された際のプレビューも可能です。もちろん、インデックスされたくないシチュエーションではクローラーを拒否する設定も可能です。"
    _ml:
      title: "機械学習"
      description: "組み込みの機械学習機能を利用して、自動的にセンシティブなメディアのフィルタリングを行うなど、運用の負担を軽減することも可能です。"
    _sentry:
      title: "Sentryサポート"
      description: "Sentryによるサーバーのメトリクス収集に対応しているため、サーバーリソースの監視、ヘルスチェック、メンテナンスに役立てることができます。"
  _featuresClient:
    _root:
      title: "WebUI"
      description: "Misskeyに付属する高機能なWebフロントエンド(Misskey Web)の特徴を紹介。"
    _responsive:
      title: "レスポンシブUI"
      description: "UIは洗練された独自のデザインシステムを使用して設計され、デスクトップ・タブレット・スマートフォンそれぞれに最適な表示・動作となるように丁寧に実装されています。"
    _theme:
      title: "テーマ"
      description: "自分の好きな見た目でMisskeyを使えます。もちろんダークモードも完全サポート。自分で高度にテーマを作ることも可能です。"
    _mfm:
      title: "MFM"
      description: "ノートにはMFMと呼ばれるMisskey専用のマークアップ言語が使用できます。太字にする・リンクを挿入する・動きを付けるといった、テキストの装飾がシンプルな構文で表現できます。"
    _widgets:
      title: "ウィジェット"
      description: "様々な種類のウィジェットを自由に配置し、必要な情報に素早くアクセス。"
    _deck:
      title: "デッキUI"
      description: "デッキUIを使うと、UIをさらに深くカスタマイズ可能。自分だけのクライアントを作ることができます。"
    _embed:
      title: "他サイトへの埋め込み"
      description: "ノート、タイムラインなどを外部のサイトに埋め込んで表示可能です。"
    _realtimeMode:
      title: "リアルタイムモード"
      description: "サーバーとWebsocket接続することで、タイムラインなどのコンテンツをリアルタイムで受信することができます。"
    _pushNotification:
      title: "プッシュ通知"
      description: "プッシュ通知に対応しているため、リアルタイムでサーバーからの通知を受け取ることができます。"
    _multiAccounts:
      title: "マルチアカウント対応"
      description: "複数のアカウントを簡単に切り替えて使用可能です。"
    _watermark:
      title: "ウォーターマーク付与機能"
      description: "投稿する画像にウォーターマークを自動で付与して、簡単にクレジット情報を残すことができます。ウォーターマークは自由にカスタマイズ可能です。"
    _imageEditing:
      title: "画像加工機能"
      description: "画像にエフェクトを追加し、カラーグレーディングを行ったり、様々なクリエイティブな表現を行うことが可能です。"
    _achievements:
      title: "実績"
      description: "Misskeyの機能を体験するモチベーションになり、オンボーディングに役立ちます。"
    _plugin:
      title: "プラグイン"
      description: "セキュアなAiScriptを用いたプラグインをインストールして、クライアントの機能を拡張可能です。"
    _settingsManagement:
      title: "柔軟な設定管理"
      description: "アカウントごとに任意のクライアント設定を上書きできるほか、複数のデバイス間で設定を共有・同期することができます。さらに、設定情報は自動バックアップ可能です。"
    _pwa:
      title: "PWA"
      description: "Misskey WebはProgressive Web Apps(PWA)に準拠していて、デバイス上でネイティブアプリのように動作させることが可能です。"
    _i18n:
      title: "多言語対応"
      description: "クライアントを様々な言語で利用可能です。"
  _featuresUpcoming:
    _root:
      title: "近日公開"
      description: "今後予定されている機能を紹介。"
    _jwt:
      title: "JWT認証"
      description: "JSON Web Token(JWT)を用いたステートレス認証を実装し、よりセキュア・より高速なリクエストの検証を実現します。"
    _newBackend:
      title: "より軽量なバックエンド"
      description: "より高速・軽量に動作可能にするための全く新しいバックエンド実装の開発を進めています。"
    _vueVapor:
      title: "Vaporモード対応"
      description: "フロントエンドで採用しているフレームワーク Vue の新しいコンパイルストラテジーをサポートし、より軽量なWeb UIを実現します。"
