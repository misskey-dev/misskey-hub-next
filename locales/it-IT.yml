_landing:
  _hero:
    description: "Misskey è una piattaforma decentralizzata, open source, per il social networking."
    gettingStarted: "Iniziamo!"
  _keyFeatures:
    _open:
      title: "Open source"
      description: "Misskey è software open source, chiunque può usarlo liberamente."
    _federated:
      title: "Decentralizzazione"
      description: "Misskey sfrutta un protocollo di comunicazione decentralizzato che collega tante comunità su server diversi."
    _powerful:
      title: "Potente"
      description: "Misskey è la soluzione adatta sia a grandi numeri di persone, che piccoli numeri. Dispone di un'ampia varietà di caratteristiche personalizzabili che ne fanno una piattaforma versatile."
  _introduction:
    title: "Facciamolo con Misskey"
    description: "Con Misskey puoi facilmente costruire la tua piattaforma senza problemi di implementazione. I servizi che crei con Misskey sono tuoi, quindi non si corre il rischio di affidarsi a piattaforme per la diffusione delle informazioni già esistenti."
    tip: "Misskey non è \"una piattaforma web\" ma è una \"base software\" per creare servizi di microblogging. Esattamente come WordPress è la base per creare un weblog."
  _decenterized:
    title: "Misskey è {0}"
    description: "Misskey è un progetto opensource di software libero, chiunque può creare un social network utilizzando Misskey. \nPer questo motivo se ne trovano tanti, già pubblicati su Internet. \nTra le caratteristiche più importanti, Misskey implementa un protocollo di comunicazione decentralizzato chiamato {0}. \nQuindi, indipendentemente dal server che scegli, puoi interagire con altre persone iscritte su altri server che sfruttano lo stesso protocollo. \nQuesto lo rende completamente diverso da altri servizi come Twitter, che appartengono ad un unica azienda commerciale. \nGli argomenti, le comunità, il linguaggio, ecc. cambiano a seconda del server. \nTrovarne uno adatto a sé, fa parte del divertimento! (Ovviamente, anche creare il proprio server è divertente)."
    activityPub: "ActivityPub"
  _useCases:
    title: "Esempi di utilizzo"
    single: "Servizio personale per raccogliere informazioni dal web e diffondere le tue informazioni"
    official: "Servizio dedicato a promuovere pubblicamente le attività di una organizzazione"
    community: "Servizio di condivisione per persone con interessi in comune"
    inHouse: "Social network privato per la intranet di una organizzazione"
  _free:
    title: "Misskey sarà sempre una piattaforma libera e open"
    description: "Misskey è un Open Source Software (OSS), il cui codice sorgente è sempre stato pubblicato apertamente fin dall'inizio e tanto lo sarà in futuro. Per questo motivo, chiunque può utilizzare il codice sorgente liberamente e gratuitamente. Grazie al supporto delle persone utilizzatrici, Misskey può rimanere libero."
  _features:
    _root:
      title: "Caratteristiche principali"
      description: "Misskey ha una grande varietà di funzioni, alcune simili ad altri software, altre esclusive. Te ne presentiamo qualcuna..."
    _note:
      title: "Note"
      description: "Su Misskey, i contributi delle persone sono chiamati “Note”. Puoi citare altre Note e allegare files o multimedia."
    _federation:
      title: "Federazione"
      description: "Il protocollo di comunicazione ActivityPub, è distribuito e aperto, quindi ogni profilo su un server Misskey può interagire con gli altri del Fediverso."
    _reaction:
      title: "Reazioni"
      description: "Puoi aggiungere “reazioni” alle Note, ti consente di esprimere i tuoi sentimenti in modo semplice e immediato."
    _customEmojis:
      title: "Emoji personalizzate"
      description: "Puoi creare emoji personalizzate da usare ovunque su Misskey."
    _channel:
      title: "Canali"
      description: "All'interno del tuo server, puoi creare canali per arricchirlo di comunità che gravitano attorno ad argomenti particolari."
    _antenna:
      title: "Antenne"
      description: "Crea Timeline personalizzate che collezionano Note su parole chiave specifiche."
    _drive:
      title: "Drive"
      description: "Puoi gestire i file caricati tramite una comoda interfaccia. In questo modo è facile organizzare le immagini preferite in cartelle e ricondividerle senza sprecare spazio."
    _2fa:
      title: "Autenticazione a più fattori"
      description: "Puoi migliorare la sicurezza dei profili registrati, grazie al sistema di autenticazione multi fattore, che sfrutta password usa-e-getta e passkey fornite da chiavi fisiche di sicurezza."
    _charts:
      title: "Statistiche"
      description: "Misskey ti consente di visualizzare facilmente le statistiche sull'uso del server, sullo stato della federazione e sulle attività pubbliche dei profili."
    _branding:
      title: "Branding"
      description: "Puoi rendere il tuo server unico, personalizzando il logo, le icone, i colori ed altro ancora."
    _roles:
      title: "Ruoli"
      description: "Puoi usare i Ruoli e personalizzare i livelli di autorizzazione per ogni persona. Possono essere condizionali, applicandosi automaticamente ai profili che soddisfano determinati criteri. Puoi anche corredarli di badge, per meglio monetizzare con il tuo server."
    _moderation:
      title: "Moderazione"
      description: "Una gamma completa di funzionalità di moderazione, aiutano la gestione del serever. Si tratta di caratteristiche integrate nella interfaccia web, utilizzabili in qualsiasi momento."
    _privacy:
      title: "Privacy"
      description: "Prendi il controllo della visibilità dei tuoi contenuti, grazie ad una quantità di impostazioni dei livelli di privacy."
    _multiPurpose:
      title: "Uno per tutti, tutti per uno"
      description: "Grazie alla connessione nel Fediverso, è possibile sia costruire un social network per tante persone, sia una potente base d'appoggio per divulgare i propri contenuti."
    _monetization:
      title: "Monetizzare"
      description: "Ci sono anche funzionalità che aiutano a monetizzare tramite il server. Ad esempio, la visualizzazione di annunci per una crescita sostenibile."
    _oss:
      title: "Mi ❤️ OSS"
      description: "Misskey è da sempre e sempre sarà software libero open source. Chiunque può utilizzare il codice sorgente liberamente e gratuitamente. Il progetto Misskey supporta attivamente anche altri software open source."
    _battleTested:
      title: "Affidabile"
      description: "Essendo in pista da più di una decade, Misskey è testato sul campo e l'alta affidabilità è una certezza."
  _featuresServer:
    _root:
      title: "Caratteristiche del server"
      description: "Caratteristiche dell'implementazione backend che supporta Misskey."
    _easyInstall:
      title: "Facile da installare"
      description: "Oltre ad essere semplice da installare con semplici comandi, è anche possibile accelerare i tempi di gestione utilizzando servizi di hosting forniti da molte aziende."
    _easySetup:
      title: "Facile da configurare"
      description: "Non è richiesta alcuna configurazione complicata per avviare il server Misskey. Le impostazioni ottimali vengono effettuate semplicemente seguendo la procedura guidata e puoi immediatamente avviare il servizio. D'altro canto, è anche possibile personalizzare impostazioni avanzate in base alle proprie esigenze tecniche."
    _api:
      title: "API"
      description: "Tutte le funzionalità di Misskey possono essere gestite tramite API HTTP. Sono facili da integrare con altre applicazioni web. Inoltre, supporta anche Webhook e connessioni WebSocket, per garantire alle altre applicazioni la fruizione degli eventi in tempo reale."
    _relay:
      title: "Compatibile coi ripetitori"
      description: "Supporta la connessione ai server Relay che trasmettono le attività nel Fediverso. Questo permette di automatizzare la raccolta di informazioni provenienti da molti server."
    _nodejs:
      title: "NodeJS nel backend"
      description: "Misskey usa un backend in NodeJS, che assicura performance leggere e veloci."
    _postgresql:
      title: "PostgreSQL"
      description: "Utilizza PostgreSQL come database principale, per una gestione garantita, stabile e robusta."
    _fullTextSearch:
      title: "Ricerca \"FullText\""
      description: "Le ricerche \"FullText\" sfruttano gli strumenti inclusi a PostgreSQL o il sistema esterno Meilisearch."
    _jobQueue:
      title: "Coda di lavoro efficiente"
      description: "La coda di lavoro impiega BullMQ, che svolge i compiti in modo efficiente, spalmando le attività su più \"worker\". Il pannello di controllo amministrativo garantisce la gestione nativa, senza utilizzare strumenti terzi."
    _cdn:
      title: "Supporto alle CDN"
      description: "Il caching facoltativo delle risorse, tramite CDN esterne, permette di ridurre il carico sul server e limitare i costi di gestione."
    _ftt:
      title: "FTT"
      description: "L'implementazione delle Timeline in modalità Fan-Out (FTT), migliora le performance sfruttando Redis, preparandole prima che siano visualizzate."
    _rbt:
      title: "RBT"
      description: "Tecnologia per reazioni in memoria (RBT) le reazioni immediate dispongono di un sistema di cache tramite Redis che migliora le performance."
    _scalable:
      title: "Scalabile"
      description: "Progettato per scalare con il crescere dell'utenza, tramite la gestione di processi in cluster, carico distribuito su molteplici server, e replicazione del database."
    _seo:
      title: "SEO"
      description: "La tecnologia di rendering sul server (SSR) permette l'indicizzibilità sui motori di ricerca di certi contenuti. Il supporto del protocollo OpenGraph (OGP) permette di condividere anteprime accattivanti condividendo su altri social network. Naturalmente, chi amministra può configurare il blocco dei crawler provenienti dai social network, se preferisce impedire l'indicizzazione."
    _ml:
      title: "Machine Learning"
      description: "Approfitta della capacità nativa di impararare a filtrare immagini esplicite automaticamente, per ridurre il carico di lavoro allo staff di moderazione."
    _sentry:
      title: "Supporto a Sentry"
      description: "Colleziona metriche tramite Sentry, per monitorare le risorse del server, predisporre controlli di efficienza e semplificare la manutenzione."
  _featuresClient:
    _root:
      title: "Interfaccia Web"
      description: "Una introduzione a Misskey Web, l'interfaccia grafica (WebUI) inclusa con Misskey."
    _responsive:
      title: "Interfaccia adattabile"
      description: "L'interfaccia grafica Web è progettata sfruttando un sistema che si adatta alle dimensioni del dispositivo in cui è ospitata. Che sia un PC desktop, un tablet o smartphone."
    _theme:
      title: "Temi"
      description: "Puoi personalizzare l'uso di Misskey Web scegliendo composizioni cromatiche che ti soddisfano, siano chiare, scure o eventualmente personalizzate nei minimi dettagli."
    _mfm:
      title: "MFM"
      description: "Tramite una sintassi semplice, la formattazione Markdown di Misskey (MFM) ti permette di decorare il testo delle Note con grassetto, link, animazioni, e tanto ancora."
    _widgets:
      title: "Riquadri"
      description: "Utilizza i riquadri per tenere immediatamente sott'occhio le informazioni di cui hai più bisogno."
    _deck:
      title: "Interfaccia a colonne"
      description: "La Deck UI ti garantisce il massimo della personalizzazione. Rendi unico il tuo client e adattalo alle tue esigenze."
    _embed:
      title: "Incorpora"
      description: "Puoi incorporare le Note, le Timeline e molto altro, nei siti web esterni."
    _realtimeMode:
      title: "Modalità in Tempo Reale"
      description: "サーバーとWebsocket接続することで、タイムラインなどのコンテンツをリアルタイムで受信することができます。"
    _pushNotification:
      title: "Notifiche push"
      description: "Ricevi avvertimenti in tempo reale dal server al tuo dispositivo, per mezzo delle Notifiche Push."
    _multiAccounts:
      title: "Profili multipli"
      description: "Puoi cambiare profilo facilmente e usare account multipli."
    _watermark:
      title: "Effetto filigrana"
      description: "Proteggi il copyright delle tue immagini aggiungendo automaticamente una filigrana mentre carichi un file."
    _imageEditing:
      title: "Modifica le immagini"
      description: "Puoi aggiungere effetti, cambiare i colori e applicare effetti creativi che modificano le tue immagini, senza necessità di un software esterno."
    _achievements:
      title: "Conquiste"
      description: "Facilita l'adozione e motiva le persone utilizzatrici tramite gamification, assegnando loro badge per attività particolari."
    _plugin:
      title: "Plugin"
      description: "Estendi le funzionalità del client Misskey Web installando Plugin scritti nel linguaggio sicuro AiScript, simile a JavaScript."
    _settingsManagement:
      title: "Gestione flessibile della configurazione"
      description: "Personalizza la configurazione di ogni account e sincronizzala sui vari dispositivi, con la sicurezza dei backup automatici."
    _pwa:
      title: "PWA"
      description: "Misskey Web è una Web App Progressiva (PWA). Funziona come una app nativa nel tuo dispositivo mobile, non servono client esterni."
    _i18n:
      title: "Multilingua"
      description: "L'interfaccia web è disponibile in tantissime lingue."
  _featuresUpcoming:
    _root:
      title: "Presto in arrivo"
      description: "Funzionalità previste nel prossimo futuro."
    _jwt:
      title: "Autenticazione JWT"
      description: "Implementare l'autenticazione utilizzando JSON Web Token (JWT) serve per ottenere una verifica dell'identità più sicura e più rapida."
    _newBackend:
      title: "Un backend più leggero"
      description: "Stiamo sviluppando un'implementazione completamente nuova del backend. Questo per semplificarne il funzionamento, affinché sia più veloce e leggero."
    _vueVapor:
      title: "Compatibilità con Vue Vapor"
      description: "Supporto per Vapor, la nuova strategia di compilazione del framework Vue. Per una interfaccia web più leggera."
  _getStarted:
    title: "Iniziamo con Misskey"
    _find:
      title: "Trova il tuo server"
